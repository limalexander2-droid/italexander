<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Alexander</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
            --iron: #a0aec0;
            --gold: #ecc94b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0 20px;
            box-sizing: border-box;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 0 0 12px 0;
        }

        .notice {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 16px;
            max-width: 480px;
        }

        /* --- THE BATTLE STAGE (Now a Galloping Loading Field) --- */
        .battle-stage {
            width: 100%;
            max-width: 450px;
            height: 160px;
            margin-top: 35px;
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        /* Arena Floor / Ground Line with Moving Texture for Galloping Illusion */
        .floor {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 200%;
            height: 2px;
            background: repeating-linear-gradient(90deg, #333 0px, #333 20px, transparent 20px, transparent 40px);
            animation: scrollLandscape 0.6s infinite linear;
        }

        /* --- THE STICK-FIGURE RIDER & HORSE --- */
        .alexander-container {
            position: absolute;
            bottom: 32px;
            left: 40%;
            transform: translateX(-50%);
            width: 110px;
            height: 95px;
            animation: horseBodyBob 0.3s infinite alternate ease-in-out;
        }

        /* --- THE HORSE (BUCEPHALUS) --- */
        .horse-body {
            position: absolute;
            bottom: 25px;
            left: 20px;
            width: 55px;
            height: 24px;
            border: 3px solid var(--text-main);
            border-radius: 12px;
            background: #1a1a1a;
        }

        .horse-neck {
            position: absolute;
            top: -15px;
            left: -10px;
            width: 16px;
            height: 25px;
            border-left: 3px solid var(--text-main);
            border-top: 3px solid var(--text-main);
            transform: rotate(-25deg);
            border-radius: 6px 0 0 0;
        }

        .horse-head {
            position: absolute;
            top: -10px;
            left: -15px;
            width: 18px;
            height: 10px;
            border: 3px solid var(--text-main);
            border-radius: 5px;
            background: #1a1a1a;
            transform: rotate(35deg);
        }

        .horse-tail {
            position: absolute;
            right: -14px;
            top: 2px;
            width: 15px;
            height: 8px;
            border-top: 3px solid var(--text-main);
            border-right: 3px solid var(--text-main);
            border-radius: 0 8px 0 0;
            transform-origin: left top;
            animation: tailFlutter 0.2s infinite alternate ease-in-out;
        }

        /* Horse Legs & Gallop Mechanics */
        .horse-leg {
            position: absolute;
            width: 3px;
            height: 25px;
            background: var(--text-main);
            transform-origin: top center;
        }
        
        /* Front Legs */
        .leg-f1 { left: 8px; bottom: -24px; animation: gallopFront 0.3s infinite linear; }
        .leg-f2 { left: 14px; bottom: -24px; animation: gallopBack 0.3s infinite linear; animation-delay: 0.15s; }
        /* Back Legs */
        .leg-b1 { right: 8px; bottom: -24px; animation: gallopBack 0.3s infinite linear; }
        .leg-b2 { right: 14px; bottom: -24px; animation: gallopFront 0.3s infinite linear; animation-delay: 0.15s; }

        /* --- ALEXANDER THE GREAT --- */
        .rider-torso {
            position: absolute;
            top: -24px;
            left: 20px;
            width: 3px;
            height: 28px;
            background: var(--text-main);
            transform: rotate(-5deg);
        }

        .rider-leg {
            position: absolute;
            top: 20px;
            left: -4px;
            width: 14px;
            height: 14px;
            border-right: 3px solid var(--text-main);
            border-bottom: 3px solid var(--text-main);
            transform: rotate(45deg);
        }

        .rider-head {
            position: absolute;
            top: -14px;
            left: -6px;
            width: 12px;
            height: 12px;
            border: 3px solid var(--text-main);
            border-radius: 50%;
            background: #1a1a1a;
        }

        /* Greek Crested Helmet */
        .rider-helmet {
            position: absolute;
            top: -20px;
            left: -7px;
            width: 16px;
            height: 8px;
            background: var(--iron);
            border: 2px solid var(--text-main);
            border-radius: 8px 8px 0 0;
        }

        .rider-plume {
            position: absolute;
            top: -27px;
            left: -12px;
            width: 26px;
            height: 7px;
            background: var(--iron);
            border-radius: 10px 10px 0 0;
            border-bottom: 2px solid var(--text-main);
            transform-origin: right bottom;
            animation: tailFlutter 0.15s infinite alternate;
        }

        /* Cape Fluttering */
        .rider-cape {
            position: absolute;
            top: 2px;
            right: -22px;
            width: 25px;
            height: 12px;
            background: #444;
            border: 2px solid var(--text-main);
            border-radius: 0 4px 4px 10px;
            transform-origin: left top;
            animation: capeFlutter 0.15s infinite alternate ease-in-out;
        }

        /* Sword Arm Raised Proudly */
        .rider-arm {
            position: absolute;
            top: 4px;
            left: -12px;
            width: 20px;
            height: 3px;
            background: var(--text-main);
            transform: rotate(135deg);
            transform-origin: right center;
        }

        .rider-sword {
            position: absolute;
            top: -4px;
            left: -18px;
            width: 22px;
            height: 4px;
            background: var(--iron);
            border: 1px solid var(--text-main);
            border-radius: 2px;
            transform: rotate(-45deg);
            box-shadow: 0 0 6px rgba(255,255,255,0.3);
        }

        /* --- ANIMATIONS TIMINGS --- */
        
        /* Simulates moving forward past grid dashes */
        @keyframes scrollLandscape {
            0% { transform: translateX(0); }
            100% { transform: translateX(-40px); }
        }

        /* Rhythmic bobbing of a galloping horse */
        @keyframes horseBodyBob {
            0% { transform: translateY(0) rotate(2deg); }
            100% { transform: translateY(-6px) rotate(-2deg); }
        }

        /* Cape whipping wildly in the wind */
        @keyframes capeFlutter {
            0% { transform: rotate(-5deg) scaleY(0.95); }
            100% { transform: rotate(15deg) scaleY(1.05); }
        }

        /* Tail and helmet plume physics */
        @keyframes tailFlutter {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(15deg); }
        }

        /* Galloping Legs Archetype Rotation */
        @keyframes gallopFront {
            0% { transform: rotate(-35deg); }
            50% { transform: rotate(30deg) cubic-bezier(0.4, 0, 0.2, 1); }
            100% { transform: rotate(-35deg); }
        }

        @keyframes gallopBack {
            0% { transform: rotate(35deg); }
            50% { transform: rotate(-30deg) cubic-bezier(0.4, 0, 0.2, 1); }
            100% { transform: rotate(35deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to IT Alexander</h1>
        <p>Great things are currently underway.</p>
        
        <div class="battle-stage">
            <div class="floor"></div>
            
            <div class="alexander-container">
                
                <div class="horse-body">
                    <div class="horse-neck">
                        <div class="horse-head"></div>
                    </div>
                    <div class="horse-tail"></div>
                    
                    <div class="horse-leg leg-f1"></div>
                    <div class="horse-leg leg-f2"></div>
                    <div class="horse-leg leg-b1"></div>
                    <div class="horse-leg leg-b2"></div>
                </div>

                <div class="rider-torso">
                    <div class="rider-head"></div>
                    <div class="rider-helmet"></div>
                    <div class="rider-plume"></div>
                    <div class="rider-cape"></div>
                    <div class="rider-leg"></div>
                    <div class="rider-arm">
                        <div class="rider-sword"></div>
                    </div>
                </div>

            </div>
        </div>

        <p class="notice">Please be patient while an incredible, high-utility space is engineered. This layout will update dynamically as developments deploy.</p>
    </div>

</body>
</html>
