<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Alexander</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
        }

        /* Automatic Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-main: #f5f5f5;
                --text-muted: #a0a0a0;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .container {
            max-width: 500px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
        }

        p {
            font-size: 1.15rem;
            line-height: 1.6;
            margin: 0 0 12px 0;
        }

        .highlight {
            font-weight: 500;
        }

        .notice {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 24px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to IT Alexander</h1>
        <p class="highlight">Great things are currently underway.</p>
        <p class="notice">Please be patient while an incredible, high-utility space is engineered behind the scenes. This layout will update dynamically as developments deploy.</p>
    </div>

</body>
</html>
