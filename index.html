<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Alexander</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            --accent-red: #cc0000;
            --accent-blue: #0066cc;
            --battle-bg: #111111;
        }

        /* Automatic Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-main: #f5f5f5;
                --text-muted: #a0a0a0;
                --accent-red: #ff4d4d;
                --accent-blue: #4da6ff;
                --battle-bg: #000000;
            }
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; /* Keeps things tight */
        }

        /* Center the Announcement Text */
        .wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: calc(100% - 80px); /* Leaves exact space for the battle bar */
            text-align: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .container { max-width: 500px; }
        h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 16px; }
        p { font-size: 1.15rem; line-height: 1.6; margin: 0 0 12px 0; }
        .notice { color: var(--text-muted); font-size: 1rem; margin-top: 24px; }

        /* --- THE BATTLE STAGE --- */
        #battleContainer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px; /* Small footer bar height */
            background-color: var(--battle-bg);
            border-top: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Basic shape of the fighters */
        .gladiator {
            position: absolute;
            width: 14px;
            height: 30px;
            border-radius: 4px;
        }

        /* Gladiator A (Red) */
        #fighterA {
            background-color: var(--accent-red);
            left: calc(50% - 40px); /* Starting position */
            animation: attackA 2s infinite ease-in-out;
        }

        /* Gladiator B (Blue) */
        #fighterB {
            background-color: var(--accent-blue);
            left: calc(50% + 26px); /* Starting position */
            animation: attackB 2s infinite ease-in-out;
            animation-delay: 0.1s; /* Tiny delay for clash feel */
        }

        /* CSS Animations for Movement & Interaction */
        @keyframes attackA {
            0%   { transform: translateX(0) scaleX(1); }
            35%  { transform: translateX(20px) scaleX(1.1); } /* Charge in */
            45%  { transform: translateX(18px) scaleX(0.9); } /* The clash */
            60%  { transform: translateX(5px) rotate(-10deg); } /* Recoil/Defense */
            100% { transform: translateX(0) scaleX(1); } /* Reset */
        }

        @keyframes attackB {
            0%   { transform: translateX(0) scaleX(1); }
            30%  { transform: translateX(5px) rotate(5deg); } /* Initial recoil/block */
            40%  { transform: translateX(-15px) scaleX(1.15); } /* Counter charge */
            50%  { transform: translateX(-13px) scaleX(1); } /* Quick parry */
            70%  { transform: translateX(-25px) rotate(15deg); } /* Deep defense step */
            100% { transform: translateX(0) scaleX(1); } /* Reset */
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="container">
            <h1>Welcome to IT Alexander</h1>
            <p>Great things are currently underway.</p>
            <p class="notice">Please be patient while an incredible, high-utility space is engineered. This layout will update dynamically as developments deploy.</p>
        </div>
    </div>

    <div id="battleContainer">
        <div class="gladiator" id="fighterA"></div>
        <div class="gladiator" id="fighterB"></div>
    </div>

</body>
</html>
