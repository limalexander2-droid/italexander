<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Alexander</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
            --gladiator-red: #ff4d4d;
            --gladiator-blue: #4da6ff;
            --iron: #a0aec0;
            --gold: #ecc94b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0 20px;
            box-sizing: border-box;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 0 0 12px 0;
        }

        .notice {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 16px;
            max-width: 480px;
        }

        /* --- THE GLADIATOR STAGE (The Red Box Target) --- */
        .battle-stage {
            width: 100%;
            max-width: 450px;
            height: 140px;
            margin-top: 35px;
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        /* Arena Floor Ground Line */
        .floor {
            position: absolute;
            bottom: 25px;
            left: 5%;
            width: 90%;
            height: 2px;
            background: #333333;
        }

        /* Base Gladiator Anatomy Setup */
        .gladiator {
            position: absolute;
            bottom: 27px;
            width: 24px;
            height: 38px;
            transform-origin: bottom center;
        }

        /* Helmets, Chest, and Shields */
        .body-armor {
            width: 100%;
            height: 26px;
            border-radius: 4px;
            position: absolute;
            bottom: 12px;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.2);
        }

        .helmet {
            width: 16px;
            height: 14px;
            background: var(--iron);
            border-radius: 4px 4px 0 0;
            position: absolute;
            top: -12px;
            left: 4px;
        }

        .plume {
            width: 6px;
            height: 8px;
            position: absolute;
            top: -7px;
            left: 5px;
            border-radius: 2px;
        }

        .shield {
            width: 6px;
            height: 16px;
            background: #718096;
            border: 1px solid var(--iron);
            border-radius: 2px;
            position: absolute;
            top: 4px;
        }

        /* Animated Footwork */
        .leg {
            width: 5px;
            height: 12px;
            position: absolute;
            bottom: 0;
            border-radius: 2px;
        }

        /* Weapons & Clashing Sparks */
        .sword {
            width: 22px;
            height: 4px;
            background: var(--iron);
            border-radius: 2px;
            position: absolute;
            top: 10px;
            transform-origin: left center;
            box-shadow: 0 0 4px rgba(255,255,255,0.4);
        }

        .spark-emitter {
            position: absolute;
            left: 50%;
            bottom: 45px;
            width: 10px;
            height: 10px;
            pointer-events: none;
        }

        .spark {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: burst 2s infinite linear;
        }

        /* --- TEAM RED CONFIGURATION --- */
        #fighterRed {
            left: calc(50% - 90px);
            animation: movementRed 2s infinite ease-in-out, idleBreathing 0.5s infinite alternate ease-in-out;
        }
        #fighterRed .body-armor { background: var(--gladiator-red); }
        #fighterRed .plume { background: var(--gladiator-red); }
        #fighterRed .shield { left: -4px; }
        #fighterRed .sword { 
            right: -18px; 
            transform-origin: left center;
            animation: swingRed 2s infinite ease-in-out;
        }
        #fighterRed .leg-left { background: #9b2c2c; left: 4px; animation: strideAlternate 0.4s infinite alternate; }
        #fighterRed .leg-right { background: #9b2c2c; right: 4px; animation: stride 0.4s infinite alternate; }

        /* --- TEAM BLUE CONFIGURATION --- */
        #fighterBlue {
            left: calc(50% + 66px);
            animation: movementBlue 2s infinite ease-in-out, idleBreathing 0.5s infinite alternate ease-in-out;
            animation-delay: 0.1s;
        }
        #fighterBlue .body-armor { background: var(--gladiator-blue); }
        #fighterBlue .plume { background: var(--gladiator-blue); }
        #fighterBlue .shield { right: -4px; }
        #fighterBlue .sword { 
            left: -18px; 
            transform-origin: right center;
            animation: swingBlue 2s infinite ease-in-out;
        }
        #fighterBlue .leg-left { background: #2b6cb0; left: 4px; animation: stride; animation-duration: 0.4s; animation-iteration-count: infinite; animation-direction: alternate; }
        #fighterBlue .leg-right { background: #2b6cb0; right: 4px; animation: strideAlternate; animation-duration: 0.4s; animation-iteration-count: infinite; animation-direction: alternate; }

        /* --- MECHANICS & ANIMATION ACTIONS --- */
        @keyframes idleBreathing {
            0% { transform: scaleY(1); }
            100% { transform: scaleY(1.04); }
        }

        @keyframes stride {
            0% { transform: rotate(-15deg); }
            100% { transform: rotate(15deg); }
        }
        @keyframes strideAlternate {
            0% { transform: rotate(15deg); }
            100% { transform: rotate(-15deg); }
        }

        /* Positional lunges and parries */
        @keyframes movementRed {
            0%   { transform: translateX(0); }
            30%  { transform: translateX(45px); } /* Lunge forward */
            38%  { transform: translateX(42px); } /* The hard impact stop */
            55%  { transform: translateX(-15px); } /* Tactical backing away */
            100% { transform: translateX(0); }
        }

        @keyframes movementBlue {
            0%   { transform: translateX(0); }
            28%  { transform: translateX(-35px); } /* Stepping into range */
            36%  { transform: translateX(-30px); } /* Impact block holding */
            50%  { transform: translateX(20px); } /* Hopping backward */
            100% { transform: translateX(0); }
        }

        /* Sharp weapon swing rotations */
        @keyframes swingRed {
            0%   { transform: rotate(-20deg); }
            28%  { transform: rotate(-45deg); } /* Wind up */
            34%  { transform: rotate(25deg); }  /* Fast strike down */
            42%  { transform: rotate(20deg); }  /* Weapon bounce recoil */
            60%  { transform: rotate(-10deg); } /* Return guard */
            100% { transform: rotate(-20deg); }
        }

        @keyframes swingBlue {
            0%   { transform: rotate(20deg); }
            26%  { transform: rotate(45deg); }  /* Wind up */
            32%  { transform: rotate(-25deg); } /* Fast strike down */
            40%  { transform: rotate(-20deg); } /* Weapon bounce recoil */
            60%  { transform: rotate(10deg); }  /* Return guard */
            100% { transform: rotate(20deg); }
        }

        /* Spark particles shooting outwards at point of contact */
        .sp1 { animation-delay: 0.33s; --x: 25px; --y: 15px; }
        .sp2 { animation-delay: 0.33s; --x: -20px; --y: 25px; }
        .sp3 { animation-delay: 0.33s; --x: 5px; --y: -30px; }

        @keyframes burst {
            0%   { transform: translate(0, 0); opacity: 0; }
            16%  { opacity: 1; }
            22%  { transform: translate(var(--x), var(--y)); opacity: 1; }
            40%  { transform: translate(var(--x), var(--y)); opacity: 0; }
            100% { transform: translate(var(--x), var(--y)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to IT Alexander</h1>
        <p>Great things are currently underway.</p>
        
        <div class="battle-stage">
            <div class="floor"></div>
            
            <div class="gladiator" id="fighterRed">
                <div class="leg leg-left"></div>
                <div class="leg leg-right"></div>
                <div class="body-armor">
                    <div class="helmet"><div class="plume"></div></div>
                    <div class="shield"></div>
                    <div class="sword"></div>
                </div>
            </div>

            <div class="spark-emitter">
                <div class="spark sp1"></div>
                <div class="spark sp2"></div>
                <div class="spark sp3"></div>
            </div>

            <div class="gladiator" id="fighterBlue">
                <div class="leg leg-left"></div>
                <div class="leg leg-right"></div>
                <div class="body-armor">
                    <div class="helmet"><div class="plume"></div></div>
                    <div class="shield"></div>
                    <div class="sword"></div>
                </div>
            </div>
        </div>

        <p class="notice">Please be patient while an incredible, high-utility space is engineered. This layout will update dynamically as developments deploy.</p>
    </div>

</body>
</html>
